<!DOCTYPE html>
<html>
<head>
<title>Investor Access</title>
<style>
body {
  background: #0d0d0b;
  color: #f5f0e8;
  font-family: 'Jost', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  border: 1px solid rgba(184,150,62,0.3);
  padding: 50px;
  width: 320px;
  text-align: center;
}

input {
  width: 100%;
  padding: 12px;
  margin: 12px 0;
  background: transparent;
  border: 1px solid rgba(184,150,62,0.2);
  color: white;
}

button {
  width: 100%;
  padding: 14px;
  background: #b8963e;
  border: none;
  color: black;
  letter-spacing: 0.2em;
  cursor: pointer;
}

a {
  color: #b8963e;
  font-size: 0.8rem;
}
</style>
</head>

<body>

<div class="box">
  <h2>Investor Login</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Access</button>

  <p id="error" style="color:#d4ad5c;"></p>

  <br>
  <a href="request.html">Request Access</a>
</div>

<script>
function login() {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  if(email === "investor@nanday.com" && pass === "1234") {
    localStorage.setItem("loggedIn", "true");
    window.location.href = "dashboard.html";
  } else {
    document.getElementById("error").innerText = "Access denied";
  }
}
</script>

</body>
</html>
